<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible Animation CSS</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #fbf6ea 0%, #f4e4bf 100%);
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.7), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(230,190,120,0.18), transparent 35%);
      pointer-events: none;
    }

    .floor-shadow {
      position: absolute;
      width: 280px;
      height: 36px;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(80,50,10,.22), rgba(80,50,10,0) 70%);
      filter: blur(8px);
      z-index: 1;
    }

    .ui-card {
      position: absolute;
      right: -420px;
      top: 130px;
      width: min(78vw, 330px);
      background: linear-gradient(180deg, #fff8eb, #f9edd1);
      border-radius: 28px;
      box-shadow: 0 20px 45px rgba(117, 82, 25, 0.16);
      border: 1px solid rgba(215, 178, 108, 0.35);
      overflow: hidden;
      z-index: 3;
      animation: cardPull 7s ease-in-out forwards;
    }

    .ui-top {
      padding: 20px 22px 14px;
      color: #d29a38;
      font-weight: 700;
      font-size: 16px;
      text-align: center;
      background: rgba(255,255,255,0.35);
    }

    .ui-body {
      padding: 18px;
    }

    .quote-box {
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      color: #40352a;
      box-shadow: inset 0 0 0 1px rgba(224, 190, 126, 0.15);
    }

    .quote-mark {
      font-size: 34px;
      line-height: 1;
      color: #e0b357;
      margin-bottom: 8px;
    }

    .verse {
      font-size: 16px;
      line-height: 1.55;
      color: #40352a;
    }

    .translation {
      background: rgba(255,255,255,0.72);
      border-radius: 18px;
      padding: 16px;
      color: #7f6c50;
      font-size: 14px;
      line-height: 1.5;
    }

    .translation strong {
      display: block;
      color: #d29a38;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .ui-footer {
      padding: 0 18px 18px;
      text-align: center;
      color: #d29a38;
      font-weight: 700;
      font-size: 15px;
    }

    .character-wrap {
      position: absolute;
      left: -180px;
      bottom: 90px;
      width: 180px;
      height: 330px;
      z-index: 4;
      animation: characterMove 7s ease-in-out forwards;
      transform-origin: center bottom;
    }

    .character {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .head {
      position: absolute;
      top: 26px;
      left: 58px;
      width: 62px;
      height: 72px;
      background: #9a5c3c;
      border-radius: 45% 45% 48% 48%;
      z-index: 6;
      box-shadow: inset -6px -8px 0 rgba(0,0,0,.06);
    }

    .hair {
      position: absolute;
      top: 8px;
      left: 48px;
      width: 84px;
      height: 64px;
      background:
        radial-gradient(circle at 18px 20px, #3a241d 0 14px, transparent 15px),
        radial-gradient(circle at 36px 16px, #3a241d 0 15px, transparent 16px),
        radial-gradient(circle at 55px 18px, #3a241d 0 14px, transparent 15px),
        radial-gradient(circle at 22px 40px, #3a241d 0 16px, transparent 17px),
        radial-gradient(circle at 46px 40px, #3a241d 0 18px, transparent 19px),
        radial-gradient(circle at 66px 38px, #3a241d 0 14px, transparent 15px);
      z-index: 7;
    }

    .eye {
      position: absolute;
      top: 48px;
      width: 9px;
      height: 9px;
      background: #1e1b18;
      border-radius: 50%;
      z-index: 8;
    }

    .eye.left { left: 76px; }
    .eye.right { left: 101px; }

    .smile {
      position: absolute;
      top: 69px;
      left: 83px;
      width: 18px;
      height: 10px;
      border-bottom: 2px solid #6f3f2d;
      border-radius: 0 0 12px 12px;
      z-index: 8;
    }

    .neck {
      position: absolute;
      top: 88px;
      left: 79px;
      width: 20px;
      height: 18px;
      background: #9a5c3c;
      border-radius: 6px;
      z-index: 4;
    }

    .torso {
      position: absolute;
      top: 100px;
      left: 38px;
      width: 104px;
      height: 108px;
      background: linear-gradient(180deg, #a2a1a5, #7e7f86);
      border-radius: 28px 28px 24px 24px;
      z-index: 3;
      box-shadow: inset -8px -10px 0 rgba(0,0,0,.08);
    }

    .arm {
      position: absolute;
      height: 18px;
      background: linear-gradient(180deg, #a2a1a5, #85868d);
      border-radius: 14px;
      transform-origin: left center;
      z-index: 5;
    }

    .arm.left {
      top: 120px;
      left: 28px;
      width: 92px;
      transform: rotate(-18deg);
      animation: armLeft 7s ease-in-out forwards;
    }

    .arm.right {
      top: 128px;
      left: 92px;
      width: 96px;
      transform: rotate(-4deg);
      animation: armRight 7s ease-in-out forwards;
    }

    .hand {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #9a5c3c;
      border-radius: 50%;
      right: -8px;
      top: 0;
    }

    .pelvis {
      position: absolute;
      top: 197px;
      left: 55px;
      width: 70px;
      height: 34px;
      background: #9fd0ff;
      border-radius: 12px;
      z-index: 2;
    }

    .leg {
      position: absolute;
      width: 22px;
      background: #9a5c3c;
      border-radius: 16px;
      transform-origin: top center;
      z-index: 1;
    }

    .leg.left {
      top: 214px;
      left: 60px;
      height: 86px;
      animation: legLeft 1s ease-in-out infinite;
    }

    .leg.right {
      top: 214px;
      left: 104px;
      height: 92px;
      animation: legRight 1s ease-in-out infinite;
    }

    .short-left,
    .short-right {
      position: absolute;
      top: 205px;
      width: 34px;
      height: 42px;
      background: linear-gradient(180deg, #8fc6ff, #72a9e6);
      border-radius: 10px;
      z-index: 3;
    }

    .short-left { left: 49px; }
    .short-right { left: 92px; }

    .shoe {
      position: absolute;
      width: 34px;
      height: 16px;
      background: #fff;
      border-radius: 12px;
      bottom: -8px;
      left: -6px;
      box-shadow: 0 2px 0 rgba(0,0,0,.08);
    }

    .pull-line {
      position: absolute;
      left: 146px;
      top: 170px;
      width: 0;
      height: 4px;
      background: linear-gradient(90deg, rgba(230,190,120,0), rgba(230,190,120,.9));
      border-radius: 20px;
      z-index: 2;
      animation: ropeGrow 7s ease-in-out forwards;
    }

    .title-pill {
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,.45);
      color: #c9922d;
      border: 1px solid rgba(214,177,108,.4);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      z-index: 5;
      backdrop-filter: blur(6px);
    }

    @keyframes characterMove {
      0% {
        left: -180px;
        transform: translateY(0) scaleX(1) rotate(0deg);
      }
      18% {
        left: 10px;
        transform: translateY(0) scaleX(1) rotate(0deg);
      }
      32% {
        left: 36px;
        transform: translateY(0) scaleX(1) rotate(0deg);
      }
      46% {
        left: 20px;
        transform: translateY(0) scaleX(.85) rotate(0deg);
      }
      54% {
        left: 8px;
        transform: translateY(0) scaleX(-1) rotate(-2deg);
      }
      72% {
        left: 30px;
        transform: translateY(-4px) scaleX(-1) rotate(-6deg);
      }
      100% {
        left: 30px;
        transform: translateY(-4px) scaleX(-1) rotate(-6deg);
      }
    }

    @keyframes cardPull {
      0% {
        right: -420px;
        transform: rotate(0deg);
      }
      48% {
        right: -420px;
        transform: rotate(0deg);
      }
      68% {
        right: 26px;
        transform: rotate(-4deg);
      }
      100% {
        right: 26px;
        transform: rotate(-4deg);
      }
    }

    @keyframes ropeGrow {
      0%, 50% {
        width: 0;
        opacity: 0;
      }
      58% {
        width: 40px;
        opacity: 1;
      }
      72%, 100% {
        width: 92px;
        opacity: 1;
      }
    }

    @keyframes armLeft {
      0%, 45% {
        transform: rotate(-18deg);
      }
      55% {
        transform: rotate(18deg);
      }
      72%, 100% {
        transform: rotate(28deg);
      }
    }

    @keyframes armRight {
      0%, 45% {
        transform: rotate(-4deg);
      }
      55% {
        transform: rotate(12deg);
      }
      72%, 100% {
        transform: rotate(18deg);
      }
    }

    @keyframes legLeft {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-10deg); }
    }

    @keyframes legRight {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(8deg); }
    }

    @media (max-width: 480px) {
      .character-wrap {
        transform-origin: center bottom;
        scale: .92;
        bottom: 78px;
      }

      .ui-card {
        top: 120px;
        width: 300px;
      }

      .verse {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="glow"></div>
    <div class="title-pill">Psaume 145:18 ✝️</div>
    <div class="floor-shadow"></div>

    <div class="pull-line"></div>

    <div class="ui-card">
      <div class="ui-top">✝ Psaume 145:18</div>
      <div class="ui-body">
        <div class="quote-box">
          <div class="quote-mark">“</div>
          <div class="verse">
            Dieu est proche de tous ceux qui l’invoquent en vérité.
          </div>
        </div>

        <div class="translation">
          <strong>Traduction française</strong>
          L’Éternel est près de tous ceux qui l’invoquent avec sincérité.
        </div>
      </div>
      <div class="ui-footer">📖 Psaume 145:18</div>
    </div>

    <div class="character-wrap">
      <div class="character">
        <div class="hair"></div>
        <div class="head"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
        <div class="neck"></div>

        <div class="torso"></div>

        <div class="arm left">
          <div class="hand"></div>
        </div>

        <div class="arm right">
          <div class="hand"></div>
        </div>

        <div class="pelvis"></div>
        <div class="short-left"></div>
        <div class="short-right"></div>

        <div class="leg left">
          <div class="shoe"></div>
        </div>

        <div class="leg right">
          <div class="shoe"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
